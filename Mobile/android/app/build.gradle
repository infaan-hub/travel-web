apply plugin: "com.android.application"
android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.tanzaniatravelmobile"

    defaultConfig {
        applicationId "com.tanzaniatravelmobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libreact_nativemodule_core.so"
        pickFirst "**/libjsi.so"
        pickFirst "**/libfbjni.so"
        pickFirst "**/libreact_debug.so"
        pickFirst "**/libreact_newarchdefaults.so"
        pickFirst "**/libreact_utils.so"
        pickFirst "**/libglog.so"
        pickFirst "**/libhermes.so"
        pickFirst "**/libhermes-executor-debug.so"
        pickFirst "**/libhermes-executor-release.so"
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}"
    implementation "com.facebook.react:react-android"
    implementation "com.facebook.react:hermes-android"
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
